<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলাদেশ লোডশেডিং ম্যাপ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: 'Hind Siliguri', sans-serif; background: #0f172a;}
        #map {height: 60vh; width: 100%;}
        .controls {padding: 15px; background: #1e293b; text-align: center;}
        h1 {color: #fff; font-size: 20px; margin-bottom: 10px;}
        .btn {padding: 15px 10px; font-size: 16px; border-radius: 10px; border: none; margin: 5px; width: 45%; font-weight: bold; cursor: pointer;}
        .off {background: #ef4444; color: white;}
        .on {background: #22c55e; color: white;}
        #status {color: #fbbf24; margin-top: 10px; font-size: 14px; min-height: 20px;}
        .legend {background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 8px; font-size: 12px;}
        .legend span {display: inline-block; width: 12px; height: 12px; margin-right: 5px; border-radius: 50%;}
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <h1>⚡ লাইভ লোডশেডিং ম্যাপ</h1>
        <button class="btn off" onclick="reportLoadShedding('off')">কারেন্ট নাই</button>
        <button class="btn on" onclick="reportLoadShedding('on')">কারেন্ট আসছে</button>
        <div id="status">লাস্ট ১ ঘন্টার রিপোর্ট দেখানো হচ্ছে</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lcamvfmgrzvecgkiirnv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_adp3OLM8xjR9NE_6rDMFvQ_QFJMzkoM'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const map = L.map('map').setView([23.8103, 90.4125], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const legend = L.control({position: 'topright'});
        legend.onAdd = () => {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<span style="background:#ef4444"></span>কারেন্ট নাই<br><span style="background:#22c55e"></span>কারেন্ট আছে';
            return div;
        };
        legend.addTo(map);

        let markers = L.layerGroup().addTo(map);

        async function reportLoadShedding(status) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = 'লোকেশন নিচ্ছি...';

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { error } = await supabase.from('reports').insert([{
                    status: status,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                }]);
                
                if(error) {
                    statusDiv.innerText = 'এরর: ' + error.message;
                } else {
                    statusDiv.innerText = 'ধন্যবাদ! রিপোর্ট যোগ হয়েছে ✅';
                    loadReports();
                }
            }, () => {
                statusDiv.innerText = 'লোকেশন পারমিশন দেন নাই';
            });
        }

        async function loadReports() {
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
            
            const { data } = await supabase
                .from('reports')
                .select('*')
                .gte('created_at', oneHourAgo);

            markers.clearLayers();
            
            data.forEach(report => {
                const color = report.status === 'off' ? '#ef4444' : '#22c55e';
                const marker = L.circleMarker([report.lat, report.lng], {
                    radius: 8,
                    fillColor: color,
                    color: '#fff',
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                }).bindPopup(`স্ট্যাটাস: ${report.status === 'off' ? 'কারেন্ট নাই' : 'কারেন্ট আছে'}<br>সময়: ${new Date(report.created_at).toLocaleTimeString('bn-BD')}`);
                markers.addLayer(marker);
            });
        }

        loadReports();
        setInterval(loadReports, 30000);
    </script>
</body>
</html>
